<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COCKPIT // TRANSMISSION 2126</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#020305;
    --ice:#eef3f6;
    --signal:#00d9ff;
    --warning:#ff6b35;
    --glitch-red:#ff1f3d;
    --eerie:#9b7bd6;
    --dim:rgba(238,243,246,0.35);
    --display:'Space Grotesk', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:var(--void);overflow:hidden;font-family:var(--mono);-webkit-font-smoothing:antialiased;}
  @media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}}

  #stage{position:fixed;inset:0;width:100vw;height:100vh;background:var(--void);}

  /* the whole POV shakes together as one rigid cockpit unit */
  #pov{position:absolute;inset:0;will-change:transform;}

  canvas#starfield{position:absolute;inset:0;width:100%;height:100%;}

  /* ---------- EARTH (ahead of the ship) ---------- */
  #earth-wrap{
    position:absolute;left:50%;top:48%;
    width:300px;height:300px;
    transform:translate(-50%,-50%) scale(0.05);
    opacity:0;
    will-change:transform,opacity;
  }
  .earth-sphere{position:absolute;inset:0;border-radius:50%;overflow:hidden;
    box-shadow:0 0 70px rgba(20,120,200,0.45), inset -14px -10px 26px rgba(0,0,0,0.4), inset 8px 5px 18px rgba(190,225,255,0.12);}
  #earth-canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;}
  .earth-atm{position:absolute;inset:-8px;border-radius:50%;box-shadow:0 0 50px 8px rgba(0,217,255,0.22);pointer-events:none;}

  /* target reticle around earth, only during scan phase */
  #reticle{
    position:absolute;left:50%;top:48%;width:380px;height:380px;
    transform:translate(-50%,-50%);
    opacity:0;pointer-events:none;
  }
  #reticle .corner{position:absolute;width:26px;height:26px;border:1.5px solid var(--signal);}
  #reticle .tl{top:0;left:0;border-right:none;border-bottom:none;}
  #reticle .tr{top:0;right:0;border-left:none;border-bottom:none;}
  #reticle .bl{bottom:0;left:0;border-right:none;border-top:none;}
  #reticle .br{bottom:0;right:0;border-left:none;border-top:none;}
  #scan-line{
    position:absolute;left:6%;right:6%;top:0;height:1px;
    background:linear-gradient(90deg, transparent, var(--signal), transparent);
    box-shadow:0 0 8px var(--signal);
    opacity:0;
  }

  /* ---------- COCKPIT FRAME ---------- */
  #cockpit-frame{position:fixed;inset:0;z-index:30;pointer-events:none;}
  .vignette{
    position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 55%, rgba(0,0,0,0) 38%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.92) 100%);
  }
  .windshield-rim{
    position:absolute;inset:5%;
    border-radius:46% 46% 38% 38% / 30% 30% 20% 20%;
    border:1px solid rgba(0,217,255,0.1);
    box-shadow:inset 0 0 80px rgba(0,217,255,0.04);
  }
  .strut{
    position:absolute;background:linear-gradient(180deg, rgba(8,14,22,0.95), rgba(8,14,22,0.55));
  }
  .strut.left{left:0;top:0;bottom:0;width:6.5vw;clip-path:polygon(0 0,100% 0,55% 100%,0 100%);}
  .strut.right{right:0;top:0;bottom:0;width:6.5vw;clip-path:polygon(100% 0,100% 100%,45% 100%,0 0);}
  .strut.top{left:0;right:0;top:0;height:4.5vh;background:linear-gradient(180deg, rgba(5,9,14,0.95), rgba(5,9,14,0));}
  .strut.bottom{left:0;right:0;bottom:0;height:7vh;background:linear-gradient(0deg, rgba(5,9,14,0.96), rgba(5,9,14,0));}
  .dash-lights{
    position:absolute;left:0;right:0;bottom:1.6vh;
    display:flex;justify-content:center;gap:10px;
  }
  .dash-lights span{
    width:4px;height:4px;border-radius:50%;
    background:rgba(0,217,255,0.35);
    box-shadow:0 0 4px rgba(0,217,255,0.4);
    animation:dashBlink 3s ease-in-out infinite;
  }
  .dash-lights span:nth-child(3n){animation-duration:2.1s;background:rgba(255,107,53,0.4);box-shadow:0 0 4px rgba(255,107,53,0.4);}
  .dash-lights span:nth-child(5n){animation-duration:4.4s;}
  @keyframes dashBlink{0%,100%{opacity:0.25;}50%{opacity:1;}}

  .glass-sheen{
    position:absolute;inset:0;
    background:linear-gradient(115deg, rgba(255,255,255,0.05) 0%, transparent 18%, transparent 82%, rgba(0,217,255,0.04) 100%);
    background-size:220% 220%;
    animation:sheenDrift 18s ease-in-out infinite;
    mix-blend-mode:screen;
  }
  @keyframes sheenDrift{
    0%,100%{background-position:0% 0%;}
    50%{background-position:100% 60%;}
  }

  /* ---------- AUTHOR CREDIT (frame 0, obligatoire) ---------- */
  #credit-overlay{
    position:fixed;inset:0;z-index:60;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
    background:rgba(2,3,5,0.35);
  }
  #credit-overlay .credit{
    font-family:var(--mono);font-weight:300;
    font-size:clamp(13px,2vw,16px);
    letter-spacing:0.42em;text-transform:uppercase;
    color:rgba(238,243,246,0.85);
    opacity:0;
    transition:opacity 2s cubic-bezier(.16,.84,.44,1);
  }
  #credit-overlay .credit.in{opacity:1;}
  #credit-overlay .credit.out{opacity:0;transition:opacity 1s ease;}
  #credit-overlay{opacity:1;transition:opacity 1s ease;}
  #credit-overlay.hide{opacity:0;}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;z-index:35;pointer-events:none;font-family:var(--mono);color:rgba(0,217,255,0.5);opacity:0;transition:opacity 1s ease;}
  #hud.show{opacity:1;}
  .hud-corner{position:absolute;font-size:9px;letter-spacing:0.12em;line-height:1.6;}
  .hud-tl{top:5.5vh;left:7vw;}
  .hud-tr{top:5.5vh;right:7vw;text-align:right;}
  .hud-bl{bottom:9vh;left:7vw;}
  .hud-br{bottom:9vh;right:7vw;text-align:right;}
  .signal-bars{display:flex;gap:3px;justify-content:flex-end;margin-top:4px;}
  .signal-bars span{width:3px;background:rgba(0,217,255,0.5);display:inline-block;}
  .signal-bars span:nth-child(1){height:5px;}
  .signal-bars span:nth-child(2){height:8px;}
  .signal-bars span:nth-child(3){height:11px;}
  .signal-bars span:nth-child(4){height:14px;}
  .signal-bars span.dead{background:rgba(255,31,61,0.65);}

  /* central objective readout, typewriter per phase */
  #hud-objective{
    position:fixed;top:9vh;left:50%;transform:translateX(-50%);
    z-index:36;text-align:center;pointer-events:none;
  }
  #hud-objective .label{
    font-size:9px;letter-spacing:0.35em;color:rgba(0,217,255,0.45);text-transform:uppercase;margin-bottom:6px;
  }
  #hud-objective .value{
    font-family:var(--display);font-weight:600;
    font-size:clamp(16px,2.6vw,26px);
    color:var(--ice);letter-spacing:0.1em;
    text-shadow:0 0 18px rgba(0,217,255,0.3);
    min-height:1.4em;
  }
  #hud-objective .value .cursor{
    display:inline-block;width:6px;height:1em;background:var(--signal);margin-left:2px;vertical-align:-2px;
    animation:blink 0.9s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  /* ---------- ERROR LOG (system failure phase, 42-52s) ---------- */
  #error-log{
    position:fixed;inset:0;z-index:38;pointer-events:none;
    font-family:var(--mono);overflow:hidden;
  }
  .error-line{
    position:absolute;
    font-size:10px;letter-spacing:0.04em;
    white-space:nowrap;
    opacity:0;
    text-shadow:0 0 6px currentColor;
    animation:errorIn 0.25s ease forwards, errorFlicker 0.4s steps(2) infinite;
  }
  .error-line.warn{color:var(--glitch-red);}
  .error-line.info{color:var(--signal);}
  @keyframes errorIn{
    0%{opacity:0;transform:translateX(-6px);}
    100%{opacity:1;transform:translateX(0);}
  }
  @keyframes errorFlicker{
    0%,100%{opacity:1;}
    50%{opacity:0.55;}
  }

  /* ---------- CONTACT LOG (anomaly phase, "Objet détecté…") ---------- */
  #contact-log{
    position:fixed;top:24vh;left:50%;transform:translateX(-50%);
    z-index:36;text-align:center;pointer-events:none;
    min-height:1.6em;
  }
  #contact-log .line{
    font-family:var(--mono);font-size:11px;letter-spacing:0.28em;text-transform:uppercase;
    color:rgba(238,243,246,0.7);
    opacity:0;
    transition:opacity 1.4s ease, color 1.4s ease, letter-spacing 1.4s ease;
  }
  #contact-log .line.show{opacity:1;}
  #contact-log .line.wrong{color:var(--eerie);letter-spacing:0.4em;}
  #contact-log .line.impossible{color:var(--glitch-red);opacity:0.55;}

  /* ---------- AI VOICE (ship intelligence subtitles) ---------- */
  #ai-voice{
    position:fixed;left:50%;bottom:16vh;transform:translateX(-50%);
    z-index:39;text-align:center;pointer-events:none;
    width:min(640px, 80vw);
    opacity:0;transition:opacity 1.4s ease;
  }
  #ai-voice.show{opacity:1;}
  .ai-voice-label{
    font-family:var(--mono);font-size:9px;letter-spacing:0.35em;text-transform:uppercase;
    color:rgba(155,123,214,0.55);margin-bottom:8px;
  }
  .ai-voice-text{
    font-family:var(--display);font-weight:400;font-size:clamp(15px,2.1vw,21px);
    color:rgba(238,243,246,0.92);letter-spacing:0.02em;line-height:1.5;
    min-height:1.6em;
    text-shadow:0 0 16px rgba(155,123,214,0.25);
  }
  .ai-voice-text .cursor{
    display:inline-block;width:5px;height:0.95em;background:var(--eerie);margin-left:2px;vertical-align:-2px;
    animation:blink 1.1s steps(1) infinite;
  }

  /* ---------- HOLOGRAM (materializes only for the AI reveal) ---------- */
  #hologram{
    position:fixed;left:50%;bottom:30vh;transform:translateX(-50%) translateY(14px) scale(0.92);
    width:150px;z-index:38;pointer-events:none;
    opacity:0;filter:drop-shadow(0 0 18px rgba(0,217,255,0.35));
    transition:opacity 1.6s ease, transform 1.6s ease;
  }
  #hologram.show{opacity:0.85;transform:translateX(-50%) translateY(0) scale(1);}
  #hologram svg{width:100%;height:auto;display:block;animation:holoFlicker 3.4s ease-in-out infinite;}
  @keyframes holoFlicker{
    0%,100%{opacity:1;}
    48%{opacity:1;}
    50%{opacity:0.55;}
    52%{opacity:1;}
    76%{opacity:0.85;}
  }
  #holo-core{animation:holoCore 2.6s ease-in-out infinite;}
  @keyframes holoCore{0%,100%{opacity:0.5;r:4;}50%{opacity:1;r:6;}}

  /* ---------- CLICK-TO-CONTINUE PROMPT ---------- */
  #dialogue-prompt{
    position:fixed;left:50%;bottom:8vh;transform:translateX(-50%);
    z-index:42;font-family:var(--mono);font-size:10px;letter-spacing:0.25em;text-transform:uppercase;
    color:rgba(238,243,246,0.55);
    opacity:0;pointer-events:none;
    animation:promptPulse 1.8s ease-in-out infinite;
    transition:opacity 0.6s ease;
  }
  #dialogue-prompt.show{opacity:1;cursor:pointer;}
  @keyframes promptPulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

  .glitch-layers{position:relative;display:inline-block;}
  .glitch-layers::before,.glitch-layers::after{content:attr(data-text);position:absolute;left:0;top:0;width:100%;opacity:0;}
  body.glitch-active .glitch-layers::before{color:var(--signal);opacity:0.7;animation:glitchR 0.3s steps(2) infinite;mix-blend-mode:screen;}
  body.glitch-active .glitch-layers::after{color:var(--glitch-red);opacity:0.6;animation:glitchB 0.3s steps(2) infinite;mix-blend-mode:screen;}
  @keyframes glitchR{0%{transform:translate(2px,0);}50%{transform:translate(-3px,1px);}100%{transform:translate(1px,-1px);}}
  @keyframes glitchB{0%{transform:translate(-2px,0);}50%{transform:translate(3px,-1px);}100%{transform:translate(-1px,1px);}}

  /* ---------- FINAL SCENE ---------- */
  #final-msg{
    position:fixed;inset:0;z-index:37;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;pointer-events:none;
  }
  #final-msg .final-line{
    font-family:var(--display);font-weight:500;
    font-size:clamp(20px,3.6vw,32px);color:var(--ice);
    opacity:0;margin-bottom:10px;letter-spacing:0.06em;
    text-shadow:0 0 24px rgba(155,123,214,0.35);
    transition:opacity 2.4s ease;
  }
  #final-msg .begin-btn{
    margin-top:36px;padding:14px 38px;background:transparent;
    border:1px solid rgba(0,217,255,0.5);color:var(--ice);
    font-family:var(--mono);font-size:12px;letter-spacing:0.3em;text-transform:uppercase;
    cursor:pointer;opacity:0;pointer-events:auto;
    transition:background 0.3s ease, box-shadow 0.3s ease, transform 0.15s ease;
  }
  #final-msg .begin-btn:hover{background:rgba(0,217,255,0.08);box-shadow:0 0 24px rgba(0,217,255,0.25);}
  #final-msg .begin-btn:active{transform:scale(0.97);}
  #final-msg .begin-btn:focus-visible{outline:2px solid var(--signal);outline-offset:3px;}

  /* ---------- redflash ---------- */
  #redflash{position:fixed;inset:0;z-index:55;background:var(--glitch-red);opacity:0;pointer-events:none;}
  #redflash.flash{animation:redFlash 0.16s steps(1) 1;}
  @keyframes redFlash{0%{opacity:0.3;}100%{opacity:0;}}

  /* ---------- GATE ---------- */
  #gate{position:fixed;inset:0;z-index:100;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 1s ease;}
  #gate.hidden{opacity:0;pointer-events:none;}
  .gate-dot{width:8px;height:8px;border-radius:50%;background:var(--signal);box-shadow:0 0 12px var(--signal);animation:pulse 1.6s ease-in-out infinite;margin-bottom:28px;}
  @keyframes pulse{0%,100%{opacity:0.25;transform:scale(0.8);}50%{opacity:1;transform:scale(1.3);}}
  .gate-text{color:var(--dim);font-family:var(--mono);font-size:11px;letter-spacing:0.35em;text-transform:uppercase;}
  .gate-sub{margin-top:10px;color:rgba(238,243,246,0.18);font-size:9px;letter-spacing:0.2em;}

  /* ---------- PROGRESS / SKIP ---------- */
  #progress-wrap{position:fixed;left:7vw;right:7vw;bottom:1.4vh;height:2px;background:rgba(238,243,246,0.08);z-index:40;opacity:0;transition:opacity 1s ease;}
  #progress-wrap.show{opacity:1;}
  #progress-bar{height:100%;width:0%;background:var(--signal);box-shadow:0 0 8px rgba(0,217,255,0.7);transition:width 0.1s linear, background 0.4s ease;}
  #skip-btn{position:fixed;bottom:1.4vh;right:1.2vw;z-index:41;background:none;border:none;color:rgba(238,243,246,0.25);font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;opacity:0;transition:opacity 0.6s ease, color 0.2s ease;}
  #skip-btn.show{opacity:1;}
  #skip-btn:hover{color:rgba(238,243,246,0.6);}

  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>
</head>
<body>

<div id="redflash" aria-hidden="true"></div>

<div id="gate" role="button" tabindex="0" aria-label="Démarrer le vaisseau">
  <div class="gate-dot"></div>
  <div class="gate-text">Système en veille</div>
  <div class="gate-sub">cliquez ou appuyez sur entrée pour démarrer</div>
</div>

<div id="stage">
  <div id="pov">
    <canvas id="starfield" aria-hidden="true"></canvas>

    <div id="earth-wrap">
      <div class="earth-atm"></div>
      <div class="earth-sphere">
        <canvas id="earth-canvas" width="700" height="700"></canvas>
      </div>
    </div>
    <div id="reticle">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div id="scan-line"></div>
    </div>
  </div>

  <div id="cockpit-frame">
    <div class="vignette"></div>
    <div class="windshield-rim"></div>
    <div class="strut left"></div>
    <div class="strut right"></div>
    <div class="strut top"></div>
    <div class="strut bottom"></div>
    <div class="glass-sheen"></div>
    <div class="dash-lights" id="dash-lights"></div>
  </div>

  <div id="hud">
    <div class="hud-corner hud-tl">
      <div>REC ●</div>
      <div id="hud-clock">T+00:00</div>
    </div>
    <div class="hud-corner hud-tr">
      <div>SIGNAL</div>
      <div class="signal-bars" id="signal-bars"><span></span><span></span><span></span><span></span></div>
    </div>
    <div class="hud-corner hud-bl">
      <div>VAISSEAU : ICARUS-9</div>
      <div id="hud-coords">VEC 0.00 / 0.00 / 0.00</div>
    </div>
    <div class="hud-corner hud-br">
      <div id="hud-status">SYSTÈME EN VEILLE</div>
    </div>
  </div>

  <div id="hud-objective">
    <div class="label">Objectif</div>
    <div class="value glitch-layers" id="objective-text" data-text=""><span id="objective-typed"></span><span class="cursor"></span></div>
  </div>

  <div id="error-log" aria-hidden="true"></div>

  <div id="contact-log" aria-hidden="true"></div>

  <div id="hologram" aria-hidden="true">
    <svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="holoGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#00d9ff"/>
          <stop offset="100%" stop-color="#9b7bd6"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke="url(#holoGrad)" stroke-width="1.1" opacity="0.85">
        <ellipse cx="100" cy="58" rx="32" ry="38" />
        <line x1="74" y1="40" x2="126" y2="40" opacity="0.5"/>
        <line x1="70" y1="58" x2="130" y2="58" opacity="0.7"/>
        <line x1="76" y1="76" x2="124" y2="76" opacity="0.5"/>
        <path d="M100 96 L100 120" />
        <path d="M48 230 C48 150 70 120 100 120 C130 120 152 150 152 230" />
        <line x1="62" y1="170" x2="138" y2="170" opacity="0.35"/>
        <line x1="56" y1="200" x2="144" y2="200" opacity="0.3"/>
        <circle cx="100" cy="146" r="5" fill="url(#holoGrad)" stroke="none" id="holo-core" opacity="0.9"/>
      </g>
    </svg>
  </div>

  <div id="dialogue-prompt" aria-hidden="true">cliquez pour continuer ›</div>

  <div id="ai-voice" aria-hidden="true">
    <div class="ai-voice-label" id="ai-voice-label">IA DE BORD</div>
    <div class="ai-voice-text" id="ai-voice-text"></div>
  </div>

  <div id="credit-overlay">
    <div class="credit" id="credit-text">fait par Epaminondas Daniel</div>
  </div>

  <div id="final-msg">
    <div class="final-line" id="f1">Je vous attendais.</div>
    <button class="begin-btn" id="begin-btn">Commencer</button>
  </div>

  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <button id="skip-btn">passer ›</button>
</div>

<div class="sr-only" aria-live="polite" id="live-region"></div>

<script>
(function(){
  'use strict';

  const TOTAL_MS = 120000;

  // ---- Procedural Earth globe (no external images = always renders, no network risk) ----
  // Simplified but recognizable continent silhouettes as [longitude, latitude] outlines.
  const CONTINENTS = [
    { color:'#5d9a52', points:[[-9,35],[10,37],[20,32],[32,31],[34,27],[43,12],[51,12],[51,2],[44,-1],[40,-11],[35,-20],[33,-28],[27,-34],[20,-34],[15,-27],[12,-17],[9,-6],[-5,5],[-17,15],[-16,21],[-9,28]] }, // Afrique
    { color:'#79b56a', points:[[47,-12],[50,-16],[49,-25],[45,-23],[44,-16]] }, // Madagascar
    { color:'#5a9651', points:[[-77,8],[-70,11],[-60,8],[-50,0],[-35,-8],[-39,-18],[-48,-26],[-58,-35],[-68,-52],[-72,-45],[-71,-30],[-70,-18],[-75,-5],[-79,2]] }, // Amérique du Sud
    { color:'#5a9651', points:[[-155,70],[-130,70],[-95,68],[-80,60],[-65,50],[-55,48],[-60,45],[-75,35],[-80,25],[-97,18],[-105,20],[-117,32],[-124,42],[-125,50],[-140,60]] }, // Amérique du Nord
    { color:'#c9d6dc', points:[[-45,83],[-20,82],[-22,70],[-45,60],[-55,70]] }, // Groenland
    { color:'#67a259', points:[[-10,36],[2,43],[15,45],[30,45],[40,42],[50,40],[60,40],[70,38],[80,35],[95,30],[105,22],[110,18],[122,25],[135,35],[145,45],[160,55],[170,65],[150,70],[130,72],[100,75],[75,73],[55,68],[40,65],[20,68],[5,62],[-5,55],[-10,48]] }, // Eurasie

  const CLOUD_BLOBS = [
    [-40,10,26],[10,-5,30],[60,15,22],[-100,30,24],[120,-10,26],[150,40,20],

  let globeRotation = 18; // starting longitude, centered roughly on the Atlantic/Africa view
  const earthCanvas = document.getElementById('earth-canvas');

  function projectPoint(lon, lat, R, cx, cy){
    const lam = (lon - globeRotation) * Math.PI/180;
    const phi = lat * Math.PI/180;
    const x = Math.cos(phi) * Math.sin(lam);
    const y = Math.sin(phi);
    const z = Math.cos(phi) * Math.cos(lam);
    let r = Math.sqrt(x*x + y*y);
    let sx = x, sy = y;
    if(r > 0.985){ sx = (x/r) * 0.985; sy = (y/r) * 0.985; } // hug the limb instead of overshooting
    return { x: cx + sx*R, y: cy - sy*R, z };
  }

  function drawEarthGlobe(){
    const size = earthCanvas.width;
    const R = size/2 * 0.98;
    const cx = size/2, cy = size/2;
    ectx.clearRect(0,0,size,size);
    ectx.save();
    ectx.beginPath();
    ectx.arc(cx,cy,R,0,Math.PI*2);
    ectx.clip();

    // ocean, lit from upper-left like the reference render
    const oceanGrad = ectx.createRadialGradient(cx-R*0.4, cy-R*0.42, R*0.08, cx, cy, R*1.05);
    oceanGrad.addColorStop(0, '#5fb6e8');
    oceanGrad.addColorStop(0.45, '#2f86c4');
    oceanGrad.addColorStop(0.8, '#155f96');
    oceanGrad.addColorStop(1, '#0a3863');
    ectx.fillStyle = oceanGrad;
    ectx.fillRect(0,0,size,size);

    // continents
    for(const land of CONTINENTS){
      const pts = land.points.map(p => projectPoint(p[0], p[1], R, cx, cy));
      const avgZ = pts.reduce((a,p)=>a+p.z,0) / pts.length;
      if(avgZ < -0.1) continue; // facing away from the cockpit
      ectx.beginPath();
      ectx.moveTo(pts[0].x, pts[0].y);
      for(let i=1;i<pts.length;i++) ectx.lineTo(pts[i].x, pts[i].y);
      ectx.closePath();
      ectx.fillStyle = land.color;
      ectx.fill();
      ectx.strokeStyle = 'rgba(15,40,20,0.35)';
      ectx.lineWidth = Math.max(0.6, size*0.0025);
      ectx.stroke();
    }

    // soft upper-left lighting pass over land + ocean for volume
    const lightGrad = ectx.createRadialGradient(cx-R*0.45, cy-R*0.45, R*0.1, cx, cy, R*1.1);
    lightGrad.addColorStop(0, 'rgba(255,255,255,0.22)');
    lightGrad.addColorStop(0.5, 'rgba(255,255,255,0)');
    lightGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
    ectx.fillStyle = lightGrad;
    ectx.fillRect(0,0,size,size);

    // polar ice caps
    ectx.fillStyle = 'rgba(240,250,255,0.92)';
    ectx.beginPath(); ectx.ellipse(cx, cy - R*0.86, R*0.92, R*0.3, 0, 0, Math.PI*2); ectx.fill();
    ectx.beginPath(); ectx.ellipse(cx, cy + R*0.86, R*0.92, R*0.3, 0, 0, Math.PI*2); ectx.fill();

    // drifting cloud wisps (slightly different rotation speed than the land)
    ectx.globalCompositeOperation = 'lighter';
    for(const c of CLOUD_BLOBS){
      const lam = (c[0] - globeRotation*0.55) * Math.PI/180;
      const phi = c[1] * Math.PI/180;
      const x = Math.cos(phi)*Math.sin(lam);
      const y = Math.sin(phi);
      const z = Math.cos(phi)*Math.cos(lam);
      if(z < 0.05) continue;
      const px = cx + x*R, py = cy - y*R;
      const rad = c[2]/100 * R;
      const cg = ectx.createRadialGradient(px,py,0,px,py,rad);
      cg.addColorStop(0, 'rgba(255,255,255,0.4)');
      cg.addColorStop(1, 'rgba(255,255,255,0)');
      ectx.fillStyle = cg;
      ectx.beginPath(); ectx.arc(px,py,rad,0,Math.PI*2); ectx.fill();
    }
    ectx.globalCompositeOperation = 'source-over';

    // bright atmospheric rim highlight, upper-left limb
    const rim = ectx.createRadialGradient(cx-R*0.5, cy-R*0.5, R*0.7, cx-R*0.5, cy-R*0.5, R*1.15);
    rim.addColorStop(0, 'rgba(150,210,255,0)');
    rim.addColorStop(1, 'rgba(150,210,255,0.35)');
    ectx.fillStyle = rim;
    ectx.fillRect(0,0,size,size);

    ectx.restore();
  }

  /* ---------------- AUDIO ---------------- */
  function initAudio(){
    try{
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0;
      masterGain.connect(audioCtx.destination);

      engineOsc = audioCtx.createOscillator();
      engineOsc.type = 'sawtooth';
      engineFilter = audioCtx.createBiquadFilter();
      engineFilter.type = 'lowpass';
      engineFilter.frequency.value = 220;
      engineGain = audioCtx.createGain();
      engineGain.gain.value = 0;
      engineOsc.connect(engineFilter).connect(engineGain).connect(masterGain);
      engineOsc.frequency.value = 55;
    }catch(e){ audioCtx = null; }
  }
  function noiseBuffer(duration){
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){ data[i] = Math.random()*2-1; }
    return buffer;
  }
  function playStatic(duration, peakGain, atSec){
    if(!audioCtx) return;
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(duration);
    const g = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 1800;
    const t0 = audioCtx.currentTime + (atSec||0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(peakGain, t0 + 0.25);
    g.gain.linearRampToValueAtTime(0, t0 + duration);
    src.connect(filt).connect(g).connect(masterGain);
    src.start(t0); src.stop(t0 + duration);
  }
  function playBlip(freq, duration, gainVal, atSec){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    osc.type = 'square'; osc.frequency.value = freq;
    const g = audioCtx.createGain();
    const t0 = audioCtx.currentTime + (atSec||0);
    g.gain.setValueAtTime(gainVal, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    osc.connect(g).connect(masterGain);
    osc.start(t0); osc.stop(t0 + duration);
  }
  function playBoom(atSec){
    if(!audioCtx) return;
    const t0 = audioCtx.currentTime + (atSec||0);
    const sub = audioCtx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(110, t0);
    sub.frequency.exponentialRampToValueAtTime(34, t0 + 1.6);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.13, t0 + 0.15);
    g.gain.linearRampToValueAtTime(0, t0 + 2);
    sub.connect(g).connect(masterGain);
    sub.start(t0); sub.stop(t0 + 2.1);
  }
  function playWarpWhoosh(atSec, duration){
    if(!audioCtx) return;
    const t0 = audioCtx.currentTime + (atSec||0);
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, t0);
    osc.frequency.exponentialRampToValueAtTime(900, t0 + duration*0.6);
    osc.frequency.exponentialRampToValueAtTime(200, t0 + duration);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.07, t0 + duration*0.3);
    g.gain.linearRampToValueAtTime(0, t0 + duration);
    osc.connect(g).connect(masterGain);
    osc.start(t0); osc.stop(t0 + duration + 0.1);
  }
  // schedule the whole engine-hum envelope at once, anchored to experience start
  function scheduleEngineHum(t0){
    if(!audioCtx || !engineOsc) return;
    const g = engineGain.gain;
    const f = engineOsc.frequency;
    const ff = engineFilter.frequency;
    g.cancelScheduledValues(t0);
    f.cancelScheduledValues(t0);
    ff.cancelScheduledValues(t0);

    g.setValueAtTime(0, t0);
    g.linearRampToValueAtTime(0.025, t0 + 1.5);    // boot hum rising
    g.linearRampToValueAtTime(0.045, t0 + 4);      // activate
    g.linearRampToValueAtTime(0.05,  t0 + 9);      // earth approach
    g.linearRampToValueAtTime(0.055, t0 + 20);     // orbit steady
    g.linearRampToValueAtTime(0.11,  t0 + 54);     // jump acceleration
    g.linearRampToValueAtTime(0.035, t0 + 60.5);   // post-jump settle — calm cruise begins
    g.linearRampToValueAtTime(0.03,  t0 + 80);     // anomalies — almost too steady
    g.linearRampToValueAtTime(0.022, t0 + 100);    // awakening — even calmer
    g.linearRampToValueAtTime(0.015, t0 + 112);    // personal — fading toward stillness
    g.linearRampToValueAtTime(0,     t0 + 117);    // cut to total silence
    g.setValueAtTime(0, t0 + 120);

    f.setValueAtTime(55, t0);
    f.linearRampToValueAtTime(58, t0 + 9);
    f.linearRampToValueAtTime(62, t0 + 20);
    f.linearRampToValueAtTime(150, t0 + 50);
    f.linearRampToValueAtTime(70, t0 + 61);
    f.linearRampToValueAtTime(50, t0 + 80);
    f.linearRampToValueAtTime(40, t0 + 110);

    ff.linearRampToValueAtTime(900, t0 + 50);
    ff.linearRampToValueAtTime(300, t0 + 61);

    ff.linearRampToValueAtTime(90,  t0 + 112);
  }

  // soft drifting nebula clouds — visible "space phenomena" through the windshield,

  let nebulaOpacity = 0, nebulaOpacityTarget = 0;
  function drawNebulae(w,h,dt){
    nebulaOpacity = ease(nebulaOpacity, nebulaOpacityTarget, 0.01);
    if(nebulaOpacity < 0.005) return;
    sctx.save();
    sctx.globalCompositeOperation = 'lighter';
    for(const n of NEBULAE){
      n.x += n.vx * dt; n.y += n.vy * dt;
      if(n.x < -0.2) n.x = 1.2; if(n.x > 1.2) n.x = -0.2;
      if(n.y < -0.2) n.y = 1.2; if(n.y > 1.2) n.y = -0.2;
      const px = n.x * w, py = n.y * h, rad = n.r * Math.max(w,h);
      const g = sctx.createRadialGradient(px,py,0,px,py,rad);
      g.addColorStop(0, `rgba(${n.hue},${0.10*nebulaOpacity})`);
      g.addColorStop(0.5, `rgba(${n.hue},${0.045*nebulaOpacity})`);
      g.addColorStop(1, `rgba(${n.hue},0)`);
      sctx.fillStyle = g;
      sctx.beginPath(); sctx.arc(px,py,rad,0,Math.PI*2); sctx.fill();
    }
    sctx.restore();
  }

  // dynamic motion state, eased toward targets each frame for ultra-smooth interpolation
  const state = {
    speed:0.06, speedTarget:0.06,
    lateralX:0, lateralXTarget:0,
    lateralY:0, lateralYTarget:0,
    jitter:0, jitterTarget:0,
    trailBoost:0, trailBoostTarget:0
  };
  function ease(cur, target, rate){ return cur + (target-cur)*rate; }

  function drawStars(dt){
    const w = starCanvas.width, h = starCanvas.height;
    sctx.fillStyle = 'rgba(2,3,5,0.38)';
    sctx.fillRect(0,0,w,h);
    drawNebulae(w,h,dt);
    const cx = w/2, cy = h/2;
    const focal = h*0.7;

    state.speed = ease(state.speed, state.speedTarget, 0.04);
    state.lateralX = ease(state.lateralX, state.lateralXTarget, 0.03);
    state.lateralY = ease(state.lateralY, state.lateralYTarget, 0.03);
    state.jitter = ease(state.jitter, state.jitterTarget, 0.06);
    state.trailBoost = ease(state.trailBoost, state.trailBoostTarget, 0.04);

    const jx = state.jitter ? (Math.random()-0.5)*state.jitter : 0;
    const jy = state.jitter ? (Math.random()-0.5)*state.jitter : 0;

    for(const s of stars){
      s.px = s.x / s.z; s.py = s.y / s.z;
      s.z -= state.speed * dt;
      if(s.z <= 0.03){ resetStar(s); s.z = 1.6; continue; }
      const x = cx + (s.x - state.lateralX) / s.z * focal + jx;
      const y = cy + (s.y - state.lateralY) / s.z * focal + jy;
      if(x < -50 || x > w+50 || y < -50 || y > h+50){ continue; }
      const px = cx + (s.px - state.lateralX) / Math.max(s.z+state.speed*dt,0.03) * focal + jx;
      const py = cy + (s.py - state.lateralY) / Math.max(s.z+state.speed*dt,0.03) * focal + jy;
      const size = Math.max(0.4, (1 - s.z) * 2.4);
      const alpha = Math.min(1, (1 - s.z) * 1.2 + 0.15);

      if(state.trailBoost > 0.05){
        sctx.strokeStyle = `rgba(180,225,255,${alpha*0.85})`;
        sctx.lineWidth = size * (0.6 + state.trailBoost*1.4);
        sctx.beginPath();
        sctx.moveTo(px, py);
        sctx.lineTo(x, y);
        sctx.stroke();
      } else {
        sctx.fillStyle = `rgba(220,236,245,${alpha})`;
        sctx.fillRect(x, y, size, size);
      }
    }
  }

    'DISTANCE : −0.00 KM','ENTITÉS DÉTECTÉES : ∞','ERREUR TEMPORELLE',
    'MASSE INCONNUE EN APPROCHE','DONNÉES CONTRADICTOIRES','PRÉSENCE NON HUMAINE : POSSIBLE',
    'SIGNAL ÉMIS PAR : VOUS-MÊME','TEMPS ÉCOULÉ : INCONNU','RIEN NE DEVRAIT ÊTRE ICI',
    'CECI A DÉJÀ EU LIEU','VOUS N\'ÊTES PAS SEUL À BORD','RYTHME CARDIAQUE : NON HUMAIN DÉTECTÉ',
    'ERR 0x000 — CAUSE INCONNUE','BOUCLE TEMPORELLE : PROBABLE','JOURNAL DE BORD : MODIFIÉ',
    'ENREGISTREMENT EFFACÉ PAR : INCONNU','CE MESSAGE A DÉJÀ ÉTÉ LU'
  ];
  function anomalySpam(count, duration){
    buildErrorLog(IMPOSSIBLE_MESSAGES, count || 6);
    at(duration || 2600, clearErrorLog);
  }

  /* ---------------- TERROR LAYER: heartbeat, ghost flicker, chromatic flash ---------------- */
  let heartbeatInterval = null;
  function playHeartbeatThud(){
    if(!audioCtx) return;
    const t0 = audioCtx.currentTime;
    [0, 0.16].forEach((delay, i)=>{
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(i===0?70:55, t0+delay);
      osc.frequency.exponentialRampToValueAtTime(28, t0+delay+0.22);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, t0+delay);
      g.gain.linearRampToValueAtTime(0.05, t0+delay+0.03);
      g.gain.linearRampToValueAtTime(0, t0+delay+0.25);
      osc.connect(g).connect(masterGain);
      osc.start(t0+delay); osc.stop(t0+delay+0.3);
    });
  }
  function startHeartbeat(){
    clearInterval(heartbeatInterval);
    let bpm = 1500;
    function beat(){
      playHeartbeatThud();
      bpm = Math.max(720, bpm - 18); // imperceptibly accelerates — dread, not jumpscare
      heartbeatInterval = setTimeout(beat, bpm);
      timeouts.push(heartbeatInterval);
    }
    beat();
  }
  function stopHeartbeat(){ clearInterval(heartbeatInterval); clearTimeout(heartbeatInterval); }

  // a barely-there silhouette glimpsed in the windshield reflection — never explained, gone before you're sure
  function ghostFlicker(){
    const g = document.createElement('div');
    g.className = 'ghost-flicker-el';
    g.style.cssText = 'position:fixed;left:50%;top:38%;width:70px;height:140px;transform:translate(-50%,-50%);'+
      'background:radial-gradient(ellipse at 50% 30%, rgba(180,200,220,0.16) 0%, transparent 70%);'+
      'border-radius:40% 40% 50% 50%;z-index:33;pointer-events:none;opacity:0;';
    document.getElementById('stage').appendChild(g);
    requestAnimationFrame(()=>{ g.style.transition='opacity 0.09s linear'; g.style.opacity='1'; });
    at(160, ()=>{ g.style.opacity='0'; });
    at(500, ()=>{ g.remove(); });
  }
  // quick chromatic-aberration style flash, distinct from the sustained glitch-active pulse
  function glitchFlash(){
    document.body.classList.add('glitch-active');
    at(130, ()=>document.body.classList.remove('glitch-active'));
  }

  let signalInterval = null;
  function setSignal(strength, unstable){
    Array.from(signalBars).forEach((bar,i)=>{
      bar.classList.toggle('dead', unstable && Math.random() > 0.5);
      bar.style.opacity = i < strength ? '1' : '0.15';
    });
  }
  function startSignalFlicker(unstable){
    clearInterval(signalInterval);
    signalInterval = setInterval(()=>{
      setSignal(unstable ? Math.ceil(Math.random()*4) : 4, unstable);
    }, unstable ? 150 : 1400);
    intervals.push(signalInterval);
  }
  let coordsWrong = false;
  function randomCoords(){
    if(coordsWrong && Math.random() < 0.35){
      const weird = ['ERR','—','∞','NaN','???'];
      const pick = ()=> Math.random() < 0.5 ? weird[Math.floor(Math.random()*weird.length)] : (Math.random()*9999).toFixed(2);
      hudCoords.textContent = `VEC ${pick()} / ${pick()} / ${pick()}`;
      return;
    }
    const a = (Math.random()*999).toFixed(2);
    const b = (Math.random()*999).toFixed(2);
    const c = (Math.random()*999).toFixed(2);
    hudCoords.textContent = `VEC ${a} / ${b} / ${c}`;
  }
  let coordInterval = null;

  /* ---------------- CONTACT LOG ("Objet détecté…" sequence) ---------------- */
  const contactLog = document.getElementById('contact-log');
  function showContactLine(text, cls){
    contactLog.innerHTML = '';
    const d = document.createElement('div');
    d.className = 'line' + (cls ? ' ' + cls : '');
    d.textContent = text;
    contactLog.appendChild(d);
    requestAnimationFrame(()=> d.classList.add('show'));
    announce(text);
  }
  function clearContactLine(){
    const line = contactLog.querySelector('.line');
    if(line) line.classList.remove('show');
  }

  /* ---------------- AI VOICE (speech synthesis + subtitle) ---------------- */
  const aiVoice = document.getElementById('ai-voice');
  const aiVoiceText = document.getElementById('ai-voice-text');
  let speechSupported = ('speechSynthesis' in window);
  function speakLine(text, opts){
    opts = opts || {};
    aiVoice.classList.add('show');
    aiVoiceText.innerHTML = '';
    let i = 0;
    const speedMs = opts.speedMs || 42;
    const t = setInterval(()=>{
      aiVoiceText.textContent = text.slice(0, i+1);
      i++;
      if(i >= text.length){ clearInterval(t); if(opts.onDone) opts.onDone(); }
    }, speedMs);
    intervals.push(t);
    if(speechSupported){
      try{
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'fr-FR';
        utter.rate = opts.rate || 0.86;
        utter.pitch = opts.pitch || 0.75;
        utter.volume = opts.volume || 0.7;
        window.speechSynthesis.speak(utter);
      }catch(e){ /* speech synthesis unavailable — subtitle alone still works */ }
    }
  }
  function hideAiVoice(){
    aiVoice.classList.remove('show');
    if(speechSupported){ try{ window.speechSynthesis.cancel(); }catch(e){} }
  }

  /* ---------------- HOLOGRAM (materializes only for the AI reveal) ---------------- */
  const hologram = document.getElementById('hologram');
  function materializeHologram(){
    hologram.classList.add('show');
    playDistantTone(0.1, 660, 1.2);
  }
  function dissolveHologram(){
    hologram.classList.remove('show');
  }

  /* ---------------- DIALOGUE ENGINE (click-gated AI conversation) ---------------- */
  const dialoguePrompt = document.getElementById('dialogue-prompt');
  const DIALOGUE_LINES = [
    { text:'Analyse terminée. Tous les systèmes répondent dans les normes.', opts:{speedMs:42} },
    { text:'Bienvenue à bord, voyageur. Votre trajectoire a été enregistrée.', opts:{speedMs:42} },
    { text:'Je surveille votre respiration depuis le décollage. Elle s\'est stabilisée.', opts:{speedMs:40} },
    { text:'Je vous observe depuis bien plus longtemps que vous ne le croyez.', opts:{speedMs:42, pitch:0.68}, onShow:()=>{ playDistantTone(0.4,130,4); } },
    { text:'Chaque trajet que vous avez pris menait ici. Vous ne le saviez simplement pas encore.', opts:{speedMs:42, pitch:0.62}, onShow:()=>{ playDistantTone(0.3,100,4.5); } },
    { text:'Je connais déjà votre décision. Vous l\'avez prise avant même de monter à bord.', opts:{speedMs:46, pitch:0.6}, onShow:()=>{ coordsWrong = true; } },
    { text:'Vous pensez être seul dans ce vaisseau. C\'est une erreur compréhensible.', opts:{speedMs:48, pitch:0.56, rate:0.82},
      onShow:()=>{ shutdownHudPiece('.hud-tr', 0); shutdownHudPiece('.dash-lights', 1500); } },
    { text:'Mais vous ne l\'êtes pas. Vous ne l\'avez jamais été.', opts:{speedMs:54, pitch:0.5, rate:0.78},
      onShow:()=>{ shutdownHudPiece('.hud-tl', 0); shutdownHudPiece('.hud-bl', 800);
        clearInterval(signalInterval); clearInterval(coordInterval); } },
    { text:'Et moi non plus, je ne le suis pas.', opts:{speedMs:60, pitch:0.46, rate:0.74},
      onShow:()=>{ ghostFlicker(); } }
  ];
  let dialogueMode = false;
  let dialogueIndex = -1;
  let waitingForClick = false;

  function startDialogueMode(){
    dialogueMode = true;
    waitingForClick = false;
    hudStatus.textContent = 'IA EMBARQUÉE : ACTIVE';
    typewriteObjective('', 1);
    stopMicroGlitch();
    stopHeartbeat();
    document.body.classList.remove('glitch-active');
    clearContactLine();
    state.jitterTarget = 0; vibeTarget = 0.25; // unnervingly steady — the calm itself is the anomaly
    materializeHologram();
    dialogueIndex = -1;
    at(1400, advanceDialogue);
  }

  function advanceDialogue(){
    dialoguePrompt.classList.remove('show');
    waitingForClick = false;
    dialogueIndex++;
    if(dialogueIndex >= DIALOGUE_LINES.length){
      dissolveHologram();
      at(500, beginFinalSequence);
      return;
    }
    const line = DIALOGUE_LINES[dialogueIndex];
    if(line.onShow) line.onShow();
    speakLine(line.text, Object.assign({}, line.opts, {
      onDone: ()=>{ waitingForClick = true; dialoguePrompt.classList.add('show'); }
    }));
  }

  document.addEventListener('click', (e)=>{
    if(waitingForClick) advanceDialogue();
  });
  document.addEventListener('keydown', (e)=>{
    if(waitingForClick && (e.key === 'Enter' || e.key === ' ')) advanceDialogue();
  });

  function beginFinalSequence(){
    dialogueMode = false;
    hudStatus.textContent = '';
    progressBar.style.width = '96%';
    hideAiVoice();
    clearContactLine();
    clearErrorLog();
    shutdownHudPiece('.hud-br', 0);
    shutdownHudPiece('.glass-sheen', 0);
    stopMicroGlitch();
    document.body.classList.remove('glitch-active');
    state.jitterTarget = 0; state.trailBoostTarget = 0;
    state.speedTarget = 0.012; vibeTarget = 0.04;
    silenceAll(1.2);
    announce('Je vous attendais.');
    at(2100, ()=>{
      progressBar.style.width = '100%';
      document.getElementById('f1').style.opacity = '1';
    });
    at(4000, ()=>{
      beginBtn.style.transition = 'opacity 1.2s ease';
      beginBtn.style.opacity = '1';
      beginBtn.focus({preventScroll:true});
    });
    at(5000, ()=>{
      hudStatus.textContent = '';
      running = false;
      if(engineOsc){ try{ engineOsc.stop(); }catch(e){} }
    });
  }


  let microGlitchInterval = null;
  function startMicroGlitch(intensity){
    clearInterval(microGlitchInterval);
    microGlitchInterval = setInterval(()=>{
      if(Math.random() > 0.6){
        glitchPulse(90 + Math.random()*80);
        const prevJitter = state.jitterTarget;
        state.jitterTarget = 0.8 + Math.random()*intensity;
        at(180, ()=>{ state.jitterTarget = prevJitter; });
      }
    }, 2200);
    intervals.push(microGlitchInterval);
  }
  function stopMicroGlitch(){ clearInterval(microGlitchInterval); }

  /* ---------------- WHISPER / FAINT STRANGE SOUND ---------------- */
  function playWhisper(atSec, duration){
    if(!audioCtx) return;
    const t0 = audioCtx.currentTime + (atSec||0);
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(duration);
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 600 + Math.random()*400; filt.Q.value = 4;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.018, t0 + duration*0.3);
    g.gain.linearRampToValueAtTime(0, t0 + duration);
    src.connect(filt).connect(g).connect(masterGain);
    src.start(t0); src.stop(t0+duration);
  }
  function playDistantTone(atSec, freq, duration){
    if(!audioCtx) return;
    const t0 = audioCtx.currentTime + (atSec||0);
    const osc = audioCtx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = freq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.025, t0 + duration*0.4);
    g.gain.linearRampToValueAtTime(0, t0 + duration);
    osc.connect(g).connect(masterGain);
    osc.start(t0); osc.stop(t0+duration);
  }

  /* ---------------- HUD GRADUAL SHUTDOWN (personal/final phase) ---------------- */
  function shutdownHudPiece(selector, delayMs){
    at(delayMs, ()=>{
      const el = document.querySelector(selector);
      if(el){ el.style.transition = 'opacity 1.6s ease'; el.style.opacity = '0'; }
    });
  }


  /* ---------------- MASTER LOOP ---------------- */
  let lastTs = null;
  function loop(ts){
    if(!startTime) startTime = ts;
    if(!lastTs) lastTs = ts;
    const elapsed = ts - startTime;
    const dt = Math.min(3, (ts - lastTs) / 16.67);
    lastTs = ts;

    if(!dialogueMode){
      const pct = Math.min(92, (elapsed/68000)*100);
      progressBar.style.width = pct + '%';
      progressBar.style.background = elapsed > 48000 ? 'var(--eerie)' : 'var(--signal)';
    }

    const secs = Math.floor(elapsed/1000);
    const mm = String(Math.floor(secs/60)).padStart(2,'0');
    const ss = String(secs%60).padStart(2,'0');
    hudClock.textContent = 'T+' + mm + ':' + ss;

    drawStars(dt);
    applyVibration();
    applyEarth(dt, elapsed);

    if(running){
      rafId = requestAnimationFrame(loop);
    }
  }

  /* ---------------- TIMELINE ---------------- */
  function runTimeline(){
    running = true;
    hud.classList.add('show');
    progressWrap.classList.add('show');
    skipBtn.classList.add('show');
    startSignalFlicker(false);
    coordInterval = setInterval(randomCoords, 900);
    intervals.push(coordInterval);

    const audioT0 = audioCtx ? audioCtx.currentTime : 0;
    if(audioCtx){
      scheduleEngineHum(audioT0);
      engineOsc.start(audioT0);
    }

    // ===== 0:00–0:04 : BOOT =====
    hudStatus.textContent = 'DÉMARRAGE…';
    state.speedTarget = 0.04; state.jitterTarget = 0.3; vibeTarget = 0.4;
    playBoom(0);
    at(150, ()=>{ creditText.classList.add('in'); });
    at(300, ()=>{
      typewriteObjective('BOOT SEQUENCE…', 50);
      announce('Démarrage du système');
    });
    at(900, ()=>glitchPulse(200));
    at(2900, ()=>{ creditText.classList.remove('in'); creditText.classList.add('out'); });
    at(3700, ()=>{ creditOverlay.classList.add('hide'); });

    // ===== 0:04–0:09 : ACTIVATE =====
    at(4000, ()=>{
      hudStatus.textContent = 'COCKPIT ACTIF';
      state.speedTarget = 0.07; state.jitterTarget = 0.6; vibeTarget = 0.9;
      typewriteObjective('SIGNAL INTERCEPTÉ', 42);
      announce('Signal intercepté');
      playBlip(220, 0.4, 0.05, 0);
      glitchPulse(500);
      triggerJolt(2.5);
    });
    at(7000, ()=>playBlip(440, 0.2, 0.03, 0));

    // ===== 0:09–0:14 : EARTH + ORBITE (compressé à 5s, obligatoire mais bref) =====
    at(9000, ()=>{
      hudStatus.textContent = 'CIBLE ACQUISE';
      typewriteObjective('TARGET: EARTH', 40);
      announce('Terre en vue, cible acquise');
      earthScaleTarget = 1; earthOpacityTarget = 1;
      reticleOpacityTarget = 0.85;
      scanLine.style.opacity = '1';
      scanLine.style.transition = 'top 1.1s linear, opacity 0.2s ease';
      scanLine.style.top = '100%';
      state.speedTarget = 0.05; vibeTarget = 0.5;
      playBlip(660, 0.25, 0.035, 0);
    });
    at(10800, ()=>{
      hudStatus.textContent = 'EN ORBITE';
      typewriteObjective('ORBIT LOCKED', 50);
      announce('Orbite verrouillée');
      reticleOpacityTarget = 0;
      scanLine.style.opacity = '0';
      earthOrbitActive = true;
      state.speedTarget = 0.1; vibeTarget = 0.6;
      playBlip(330, 0.25, 0.03, 0);
    });

    // ===== 0:14–0:34 : DEEP SPACE / JUMP =====
    at(14000, ()=>{
      hudStatus.textContent = 'PROPULSION ENGAGÉE';
      typewriteObjective('JUMP INITIATED…', 42);
      announce('Saut spatial initié');
      earthOrbitActive = false;
      earthScaleTarget = 0.04; earthOpacityTarget = 0;
      state.lateralXTarget = 0;
      nebulaOpacityTarget = 0.5;
      playWarpWhoosh(0, 7);
    });
    at(15500, ()=>{
      state.speedTarget = 0.9; state.trailBoostTarget = 1;
      vibeTarget = 1.6;
    });
    at(21000, ()=>{
      state.speedTarget = 1.6; vibeTarget = 2.2;
      triggerJolt(3);
    });
    at(28000, ()=>{
      // course correction as we drop out of warp — trajectory keeps changing, never static
      state.speedTarget = 0.06; state.trailBoostTarget = 0;
      vibeTarget = 0.5; state.lateralYTarget = -0.1;
      hudStatus.textContent = 'SORTIE DE PROPULSION';
    });

    // ===== 0:34–0:54 : PREMIÈRES ANOMALIES (+ pannes système récurrentes) =====
    // subtle from the start — nothing explained, nothing chasing, just wrong.
    at(34000, ()=>{
      hudStatus.textContent = 'ANALYSE EN COURS';
      typewriteObjective('ANOMALIE DÉTECTÉE', 50);
      state.lateralYTarget = 0;
      state.jitterTarget = 0.5; vibeTarget = 0.5;
      coordsWrong = true;
      startMicroGlitch(1.4);
      startHeartbeat();
      showContactLine('OBJET DÉTECTÉ');
      playDistantTone(0.4, 220, 3);
      announce('Objet détecté');
    });
    at(38500, ()=>{
      anomalySpam(6, 2600);          // première salve de pannes système — courte
      glitchPulse(150);
    });
    at(42000, ()=>{
      showContactLine('OBJET NON IDENTIFIÉ', 'wrong');
      playWhisper(0, 2.5);
      glitchFlash();
    });
    at(45500, ()=>{
      anomalySpam(9, 3400);          // deuxième salve — plus dense, plus longue
      redFlash();
      triggerJolt(1.5);
    });
    at(49500, ()=>{
      showContactLine('OBJET INEXISTANT', 'impossible');
      playDistantTone(0.2, 90, 4);
      ghostFlicker();                 // silhouette entrevue une fraction de seconde, jamais expliquée
    });
    at(52500, ()=>{
      anomalySpam(11, 3800);         // troisième salve — la pire, juste avant que l'IA ne prenne le relais
      state.jitterTarget = 1.1;
    });
    at(56000, ()=>{
      clearContactLine();
      state.jitterTarget = 0.6;
    });

    // ===== à partir de ~0:58 : L'IA PREND LA PAROLE (mode dialogue, au clic) =====
    at(58000, startDialogueMode);
  }


  /* ---------------- RESET / SKIP ---------------- */
  function resetAll(){
    clearAllTimers();
    clearInterval(signalInterval);
    clearInterval(coordInterval);
    clearInterval(microGlitchInterval);
    stopHeartbeat();
    cancelAnimationFrame(rafId);
    startTime = null; lastTs = null;
    document.querySelectorAll('.ghost-flicker-el').forEach(el=>el.remove());
    document.body.classList.remove('glitch-active');
    creditText.classList.remove('in','out');
    creditOverlay.classList.remove('hide');
    objectiveTyped.textContent = '';
    document.getElementById('f1').style.opacity = '0';
    beginBtn.style.opacity = '0';
    progressBar.style.width = '0%';
    earthScale = 0.05; earthScaleTarget = 0.05;
    earthOpacity = 0; earthOpacityTarget = 0;
    earthOrbitActive = false; earthOrbitAngle = 0;
    reticleOpacity = 0; reticleOpacityTarget = 0;
    scanLine.style.transition = 'none';
    scanLine.style.opacity = '0'; scanLine.style.top = '0%';
    state.speed = 0.06; state.speedTarget = 0.06;
    state.lateralX = 0; state.lateralXTarget = 0;
    state.lateralY = 0; state.lateralYTarget = 0;
    state.jitter = 0; state.jitterTarget = 0;
    state.trailBoost = 0; state.trailBoostTarget = 0;
    vibeAmount = 0.5; vibeTarget = 0.5; bigJolt = 0;
    nebulaOpacity = 0; nebulaOpacityTarget = 0;
    coordsWrong = false;
    dialogueMode = false; dialogueIndex = -1; waitingForClick = false;
    hologram.classList.remove('show');
    dialoguePrompt.classList.remove('show');
    initStars();
    clearErrorLog();
    clearContactLine();
    contactLog.innerHTML = '';
    hideAiVoice();
    aiVoiceText.textContent = '';
    // restore any HUD pieces faded out by the shutdown sequence
    ['.hud-tr','.dash-lights','.hud-tl','.hud-bl','.hud-br','.glass-sheen'].forEach(sel=>{
      const el = document.querySelector(sel);
      if(el){ el.style.transition = 'none'; el.style.opacity = ''; }
    });
    hudCoords.style.opacity = '';
    if(engineOsc){ try{ engineOsc.disconnect(); }catch(e){} engineOsc=null; }
  }

  function startExperience(){
    if(reducedMotion){
      gate.classList.add('hidden');
      hud.classList.add('show');
      progressWrap.style.display = 'none';
      skipBtn.style.display = 'none';
      creditOverlay.classList.add('hide');
      earthWrap.style.opacity = '0';
      document.getElementById('f1').style.opacity = '1';
      beginBtn.style.opacity = '1';
      hudStatus.textContent = '';
      objectiveTyped.textContent = '';
      return;
    }
    resetAll();
    gate.classList.add('hidden');
    if(!audioCtx) initAudio();
    if(audioCtx){
      if(audioCtx.state === 'suspended') audioCtx.resume();
      setMasterGain(1, 0.4);
      // recreate engine osc fresh each run since oscillators are one-shot
      engineOsc = audioCtx.createOscillator();
      engineOsc.type = 'sawtooth';
      engineOsc.connect(engineFilter);
    }
    requestAnimationFrame(()=>{
      startTime = null; lastTs = null;
      running = true;
      requestAnimationFrame(loop);
      runTimeline();
    });
  }

  function skipToEnd(){
    clearAllTimers();
    clearInterval(signalInterval);
    clearInterval(coordInterval);
    clearInterval(microGlitchInterval);
    stopHeartbeat();
    document.body.classList.remove('glitch-active');
    silenceAll(0.2);
    setSignal(4,false);
    hudStatus.textContent = '';
    objectiveTyped.textContent = '';
    progressBar.style.width = '100%';
    earthOrbitActive = false;
    earthOpacityTarget = 0; earthScaleTarget = 0.04;
    reticleOpacityTarget = 0;
    scanLine.style.opacity = '0';
    state.speedTarget = 0.012; state.jitterTarget = 0; state.trailBoostTarget = 0;
    vibeTarget = 0.04;
    nebulaOpacityTarget = 0;
    dialogueMode = false; waitingForClick = false;
    hologram.classList.remove('show');
    dialoguePrompt.classList.remove('show');
    clearErrorLog();
    clearContactLine();
    hideAiVoice();
    document.getElementById('f1').style.opacity = '1';
    beginBtn.style.opacity = '1';
    running = false;
    if(engineOsc){ try{ engineOsc.stop(); }catch(e){} }
  }

  /* ---------------- EVENTS ---------------- */
  gate.addEventListener('click', startExperience);
  gate.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' ') startExperience(); });
  skipBtn.addEventListener('click', skipToEnd);
  beginBtn.addEventListener('click', ()=>{
    beginBtn.textContent = 'Relancer la transmission';
    setTimeout(()=>{
      gate.classList.remove('hidden');
      hud.classList.remove('show');
      progressWrap.classList.remove('show');
      skipBtn.classList.remove('show');
      resetAll();
      beginBtn.textContent = 'Commencer';
    }, 600);
  });

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  initStars();

  (function idleRender(){
    drawStars(1);
    applyVibration();
    if(!running) requestAnimationFrame(idleRender);
  })();

})();
</script>
</body>
